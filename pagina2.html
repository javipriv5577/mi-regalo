<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 🌻</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, rgba(255, 235, 59, 0.6), rgba(255, 213, 79, 0.6));
    overflow:hidden;
    opacity:0;
    transition: opacity 2s ease;
}

/* fade */
body.show{ opacity:1; }

/* CONTENEDOR */
.main{
    display:flex;
    gap:20px;
    width:90%;
    max-width:1000px;
    z-index:2;
    align-items:stretch;
}

/* TARJETAS */
.card{
    flex:1;
    height:420px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    background: rgba(255,255,0,0.2);
    backdrop-filter: blur(10px);
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    animation: aparecer 1.5s ease;
}

@keyframes aparecer{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* POEMA (escritura) */
.poema{
    color:white;
    font-size:16px;
    line-height:1.7;
    text-align:center;
    white-space: pre-line;
    overflow:hidden;
    border-right:2px solid white;

    text-shadow:
        0 0 5px black,
        0 0 10px black,
        0 0 15px rgba(0,0,0,0.8);
}

/* IMAGEN */
.final-img{
    width:100%;
    max-height:180px;
    object-fit:contain;
    border-radius:15px;
    box-shadow:0 0 15px rgba(255,255,255,0.8),
               0 0 30px rgba(255,215,0,0.6);
}

/* CARRUSEL */
.carrusel{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.carrusel img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    transition:0.5s;
    box-shadow:0 0 15px rgba(255,255,255,0.8),
               0 0 30px rgba(255,215,0,0.6);
}

/* BOTONES */
.btn{
    position:absolute;
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:25px;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}
.prev{left:10px;}
.next{right:10px;}

/* TITULO */
.titulo{
    text-align:center;
    color:white;
    font-size:22px;
    margin-bottom:10px;
    text-shadow:0 0 10px black, 0 0 20px gold;
}

/* GIRASOLES */
.girasol{
    position:absolute;
    font-size:100px;
    animation: flotar 8s linear infinite, girar 6s linear infinite;
}

.hoja{
    position:absolute;
    font-size:60px;
    animation: flotar 10s linear infinite, girar 8s linear infinite;
}

@keyframes flotar{
    0%{transform:translateY(100vh); opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh); opacity:0;}
}

@keyframes girar{
    from{rotate:0deg;}
    to{rotate:360deg;}
}

.g1{left:5%;}
.g2{left:20%;}
.g3{left:80%;}
.g4{left:60%;}

/* PARTICULAS */
.particula{
    position:absolute;
    width:6px;
    height:6px;
    background:gold;
    border-radius:50%;
    box-shadow:0 0 10px gold, 0 0 20px yellow;
    animation: subir 4s linear infinite;
}

@keyframes subir{
    0%{transform:translateY(100vh); opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh); opacity:0;}
}

/* RESPONSIVE */
@media (max-width:768px){
    .main{flex-direction:column;}
    .card{height:auto;}
}
</style>
</head>

<body>

<!-- GIRASOLES -->
<div class="girasol g1">🌻</div>
<div class="girasol g2">🌻</div>
<div class="girasol g3">🌻</div>
<div class="girasol g4">🌻</div>

<!-- HOJAS -->
<div class="hoja" style="left:15%">🍃</div>
<div class="hoja" style="left:75%">🍃</div>

<div class="main">

<!-- POEMA -->
<div class="card">
    <div class="poema" id="poema"></div>
    <img src="foto0.jpg" class="final-img">
</div>

<!-- CARRUSEL -->
<div class="card">
    <h2 class="titulo">Te amo 💛</h2>
    <div class="carrusel">
        <button class="btn prev" onclick="cambiar(-1)">❮</button>
        <img id="imagenActual" src="foto1.jpg">
        <button class="btn next" onclick="cambiar(1)">❯</button>
    </div>
</div>

</div>

<!-- MUSICA -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
// fade + musica
window.onload = ()=>{
    document.body.classList.add("show");

    const audio = document.getElementById("musica");
    audio.volume = 0;

    let musicaIniciada = false;

document.addEventListener("click", ()=>{
    if(musicaIniciada) return; // 🔥 evita reinicios

    musicaIniciada = true;

    audio.play();

    let v = 0;
    const subir = setInterval(()=>{
        if(v < 1){
            v += 0.02;
            audio.volume = v;
        }else{
            clearInterval(subir);
        }
    },200);
});
}

// carrusel
let imgs=["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg"];
let i=0;
function cambiar(d){
    i+=d;
    if(i<0)i=imgs.length-1;
    if(i>=imgs.length)i=0;

    let img=document.getElementById("imagenActual");
    img.style.opacity=0;
    setTimeout(()=>{
        img.src=imgs[i];
        img.style.opacity=1;
    },300);
}

// texto animado
const texto=`En el jardín de la vida, eres la flor más bella,
con tu luz y aroma, eres mi eterna estrella.
Tu presencia es calma, es brillo y es razón,
un suspiro suave que habita en mi corazón.

Que tu sonrisa ilumine mi vida cada instante,
y que tu esencia sea el aire que respiro constante.

Porque en cada latido, sin decirlo siquiera,
te llevo conmigo de una forma sincera.`;

let t=0;
function escribir(){
    if(t<texto.length){
        document.getElementById("poema").innerHTML+=texto[t];
        t++;
        setTimeout(escribir,40);
    }
}
window.addEventListener("load", escribir);

// particulas
setInterval(()=>{
    const p=document.createElement("div");
    p.className="particula";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),4000);
},300);
</script>

</body>
</html>
