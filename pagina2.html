<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 🌻</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, rgba(255,235,59,0.6), rgba(255,213,79,0.6));
    overflow-x:hidden;
}

/* FONDO ANIMADO (YA NO SE DUPLICA) */
.fondo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
}

/* CONTENIDO */
.main{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    gap:40px;
    width:90%;
    max-width:1000px;
    margin:50px auto;
}

/* TARJETAS */
.card{
    background: rgba(255,255,0,0.2);
    backdrop-filter: blur(10px);
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

/* TITULO */
.titulo{
    text-align:center;
    color:white;
    margin-bottom:15px;
}

/* IMAGENES */
.img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
}

/* CARRUSEL */
.carrusel{
    position:relative;
}

.carrusel img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    transition:0.4s;
}

/* BOTONES */
.btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:20px;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}
.prev{left:10px;}
.next{right:10px;}

/* ANIMACIONES */
.girasol, .hoja, .particula{
    position:absolute;
    pointer-events:none;
}

.girasol{
    font-size:90px;
    animation: flotar 12s linear infinite, girar 10s linear infinite;
}

.hoja{
    font-size:50px;
    animation: flotar 14s linear infinite, girar 12s linear infinite;
}

@keyframes flotar{
    0%{transform:translateY(100%); opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10%); opacity:0;}
}

@keyframes girar{
    from{rotate:0deg;}
    to{rotate:360deg;}
}

/* PARTICULAS */
.particula{
    width:6px;
    height:6px;
    background:gold;
    border-radius:50%;
    animation: subir 6s linear infinite;
}

@keyframes subir{
    0%{transform:translateY(100%); opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10%); opacity:0;}
}
</style>
</head>

<body>

<!-- FONDO -->
<div class="fondo" id="fondo"></div>

<div class="main">

<!-- POEMA -->
<div class="card">
    <h2 class="titulo">💛</h2>
    <p style="color:white;text-align:center;">
        Tu sonrisa ilumina mi vida,<br>
        y tu presencia me da calma.
    </p>
</div>

<!-- CARRUSEL VERTICAL -->
<div class="card">
    <h2 class="titulo">Tus fotos 📸</h2>
    <div class="carrusel">
        <button class="btn prev" onclick="cambiarVertical(-1)">❮</button>
        <img id="vertical" src="foto01.jpg">
        <button class="btn next" onclick="cambiarVertical(1)">❯</button>
    </div>
</div>

<!-- CARRUSEL HORIZONTAL -->
<div class="card">
    <h2 class="titulo">Momentos 💫</h2>
    <div class="carrusel">
        <button class="btn prev" onclick="cambiarHorizontal(-1)">❮</button>
        <img id="horizontal" src="foto1.jpg">
        <button class="btn next" onclick="cambiarHorizontal(1)">❯</button>
    </div>
</div>

</div>

<script>
/* ARRAYS */
let verticalImgs = ["foto01.jpg","foto02.jpg","foto03.jpg","foto04.jpg","foto05.jpg"];
let horizontalImgs = ["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg"];

let v=0;
let h=0;

/* FUNCIONES */
function cambiarVertical(d){
    v+=d;
    if(v<0)v=verticalImgs.length-1;
    if(v>=verticalImgs.length)v=0;
    document.getElementById("vertical").src=verticalImgs[v];
}

function cambiarHorizontal(d){
    h+=d;
    if(h<0)h=horizontalImgs.length-1;
    if(h>=horizontalImgs.length)h=0;
    document.getElementById("horizontal").src=horizontalImgs[h];
}

/* FONDO DINAMICO (sin duplicarse) */
const fondo = document.getElementById("fondo");

setInterval(()=>{
    const e=document.createElement("div");
    e.className="girasol";
    e.style.left=Math.random()*100+"%";
    e.innerHTML="🌻";
    fondo.appendChild(e);
    setTimeout(()=>e.remove(),12000);
},2000);

setInterval(()=>{
    const p=document.createElement("div");
    p.className="particula";
    p.style.left=Math.random()*100+"%";
    fondo.appendChild(p);
    setTimeout(()=>p.remove(),6000);
},800);
</script>

</body>
</html>
