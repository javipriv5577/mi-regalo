<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 🌻</title>

<style>
body{
    margin:0;
    min-height:100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, rgba(255, 235, 59, 0.6), rgba(255, 213, 79, 0.6));
    overflow-x:hidden;
    opacity:0;
    transition: opacity 2s ease;
}
body.show{ opacity:1; }

/* CONTENEDOR */
.main{
    display:flex;
    gap:20px;
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:20px 0;
}

/* TARJETAS */
.card{
    flex:1;
    background: rgba(255,255,0,0.2);
    backdrop-filter: blur(10px);
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

/* POEMA */
.poema{
    color:white;
    font-size:16px;
    text-align:center;
    white-space:pre-line;
    border-right:2px solid white;
    text-shadow:0 0 5px black,0 0 10px black;
}

/* IMAGEN */
.final-img{
    width:100%;
    max-height:180px;
    object-fit:contain;
    border-radius:15px;
    margin-top:10px;
}

/* CARRUSEL */
.carrusel{
    position:relative;
    width:100%;
    height:250px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.carrusel img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:15px;
    transition:0.5s;
}

/* BOTONES */
.btn{
    position:absolute;
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:25px;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}
.prev{left:10px;}
.next{right:10px;}

/* TITULO */
.titulo{
    text-align:center;
    color:white;
    margin-bottom:10px;
}

/* 🌟 PARTICULAS VISIBLES */
.particula{
    position:fixed;
    width:8px;
    height:8px;
    background: radial-gradient(circle, #fff, gold);
    border-radius:50%;
    pointer-events:none;
    animation: flotar 6s linear infinite;
}

@keyframes flotar{
    0%{
        transform: translateY(100vh) scale(0.5);
        opacity:0;
    }
    30%{ opacity:1; }
    100%{
        transform: translateY(-10vh) scale(1.2);
        opacity:0;
    }
}

/* 📱 RESPONSIVE */
@media (max-width:768px){
    .main{
        flex-direction:column;
    }

    .carrusel{
        height:220px;
    }
}
</style>
</head>

<body>

<div class="main">

<!-- POEMA -->
<div class="card">
    <div id="poema" class="poema"></div>
    <img src="foto0.jpg" class="final-img">
</div>

<!-- CARRUSEL -->
<div class="card">
    <h2 class="titulo">Te amo 💛</h2>

    <div class="carrusel" id="carrusel">
        <button class="btn prev" onclick="cambiar(-1)">❮</button>
        <img id="imagenActual" src="foto1.jpg">
        <button class="btn next" onclick="cambiar(1)">❯</button>
    </div>
</div>

</div>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
// 🎵 MUSICA SIN CORTES
let started=false;
document.addEventListener("click",()=>{
    if(started) return;
    started=true;

    const a=document.getElementById("musica");
    a.volume=0;
    a.play();

    let v=0;
    const subir=setInterval(()=>{
        if(v<1){
            v+=0.02;
            a.volume=v;
        }else{
            clearInterval(subir);
        }
    },200);
});

// 📸 CARRUSEL MANUAL
let imgs=["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg"];
let i=0;

function cambiar(d){
    i=(i+d+imgs.length)%imgs.length;

    const img=document.getElementById("imagenActual");
    img.style.opacity=0;

    setTimeout(()=>{
        img.src=imgs[i];
        img.style.opacity=1;
    },300);
}

// 👉 SWIPE
let startX=0;
document.getElementById("carrusel").addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
});
document.getElementById("carrusel").addEventListener("touchend",e=>{
    let endX=e.changedTouches[0].clientX;
    if(startX-endX>50) cambiar(1);
    if(endX-startX>50) cambiar(-1);
});

// ✨ TEXTO ANIMADO
const texto=`En el jardín de la vida, eres la flor más bella,
con tu luz y aroma, eres mi eterna estrella.
Tu presencia es calma, es brillo y es razón,
un suspiro suave que habita en mi corazón.

Que tu sonrisa ilumine mi vida cada instante,
y que tu esencia sea el aire que respiro constante.

Porque en cada latido, sin decirlo siquiera,
te llevo conmigo de una forma sincera.`;

let t=0;
function escribir(){
    if(t<texto.length){
        document.getElementById("poema").innerHTML+=texto[t];
        t++;
        setTimeout(escribir,40);
    }
}
escribir();

// 💛 PARTICULAS VISIBLES
setInterval(()=>{
    let p=document.createElement("div");
    p.className="particula";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);

    setTimeout(()=>p.remove(),6000);
},200);

// FADE
window.onload=()=>document.body.classList.add("show");
</script>

</body>
</html>
