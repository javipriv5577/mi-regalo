<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 🩵</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #87CEEB, #bde0fe);
    overflow-x:hidden;
}

/* FONDO */
.fondo{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
}

/* CONTENIDO */
.main{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    gap:40px;
    width:90%;
    max-width:1000px;
    margin:50px auto;
}

/* TARJETAS */
.card{
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

/* TITULO */
.titulo{
    text-align:center;
    color:#0a2540;
    font-weight:bold;
    margin-bottom:15px;
}

/* 🌸 FOTO DEL POEMA */
.foto-poema{
    display:flex;
    justify-content:center;
    margin-bottom:15px;
}

.foto-poema img{
    width:160px;
    height:160px;
    object-fit:cover;
    border-radius:50%;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* POEMA */
.poema{
    color:#0a2540;
    text-align:center;
    line-height:1.8;
    white-space:pre-line;
    font-size:17px;
}

/* CARRUSEL */
.carrusel{
    position:relative;
    display:flex;
    justify-content:center;
}

/* VERTICAL */
.vertical{
    width:220px;
    height:400px;
    object-fit:cover;
    border-radius:15px;
}

/* HORIZONTAL MEJORADO */
.horizontal{
    width:100%;
    height:400px;
    object-fit:cover;
    object-position:center;
    border-radius:15px;
}

/* BOTONES */
.btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:20px;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}
.prev{left:10px;}
.next{right:10px;}

/* MARIPOSAS */
.mariposa{
    position:absolute;
    font-size:28px;
    animation: volar linear infinite;
}

@keyframes volar{
    0%{transform:translateY(100vh); opacity:0;}
    50%{opacity:1;}
    100%{transform:translateY(-10vh); opacity:0;}
}

/* RESPONSIVE */
@media (max-width:768px){
    .horizontal{
        height:300px;
    }

    .foto-poema img{
        width:130px;
        height:130px;
    }
}
</style>
</head>

<body>

<div class="fondo" id="fondo"></div>

<div class="main">

<!-- POEMA -->
<div class="card">

    <div class="foto-poema">
        <img src="flores.jpg">
    </div>

    <div class="poema" id="poema"></div>
</div>

<!-- CARRUSEL VERTICAL -->
<div class="card">
    <h2 class="titulo">Únicos 🩵</h2>
    <div class="carrusel">
        <button class="btn prev" onclick="cambiarVertical(-1)">❮</button>
        <img id="vertical" class="vertical" src="foto01.jpg">
        <button class="btn next" onclick="cambiarVertical(1)">❯</button>
    </div>
</div>

<!-- CARRUSEL HORIZONTAL -->
<div class="card">
    <h2 class="titulo">Nosotros ✨</h2>
    <div class="carrusel">
        <button class="btn prev" onclick="cambiarHorizontal(-1)">❮</button>
        <img id="horizontal" class="horizontal" src="foto1.jpg">
        <button class="btn next" onclick="cambiarHorizontal(1)">❯</button>
    </div>
</div>

</div>

<script>
// POEMA
const texto=`En el jardín de la vida, eres la más bella,
tu luz me guía como una estrella.
Tu sonrisa ilumina cada momento,
y tu presencia me da calma y aliento.

Eres paz, eres brillo, eres razón,
y en cada latido estás en mi corazón. TE AMO 🩵`;

let i=0;
function escribir(){
    if(i<texto.length){
        document.getElementById("poema").innerHTML+=texto[i];
        i++;
        setTimeout(escribir,35);
    }
}
escribir();

// CARRUSELES
let verticalImgs=["foto01.jpg","foto02.jpg","foto03.jpg","foto04.jpg","foto05.jpg"];
let horizontalImgs=["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg"];

let v=0,h=0;

function cambiarVertical(d){
    v=(v+d+verticalImgs.length)%verticalImgs.length;
    document.getElementById("vertical").src=verticalImgs[v];
}

function cambiarHorizontal(d){
    h=(h+d+horizontalImgs.length)%horizontalImgs.length;
    document.getElementById("horizontal").src=horizontalImgs[h];
}

// MARIPOSAS
const fondo=document.getElementById("fondo");
const colores=["#ff4d6d","#ffbe0b","#3a86ff","#8338ec","#06d6a0"];

setInterval(()=>{
    const m=document.createElement("div");
    m.className="mariposa";
    m.style.left=Math.random()*100+"%";
    m.style.color=colores[Math.floor(Math.random()*colores.length)];
    m.style.animationDuration=(8 + Math.random()*6)+"s";
    m.innerHTML="🦋";
    fondo.appendChild(m);
    setTimeout(()=>m.remove(),12000);
},500);
</script>

</body>
</html>
